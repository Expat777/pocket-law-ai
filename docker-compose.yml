services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    expose:
      - "6333"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pocketlaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocketlaw}
      POSTGRES_DB: ${POSTGRES_DB:-pocketlaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  bot:
    build: .
    depends_on:
      - qdrant
      - postgres
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      POSTGRES_HOST: postgres

volumes:
  qdrant_storage:
  postgres_data:
